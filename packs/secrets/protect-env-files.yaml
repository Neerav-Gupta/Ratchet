id: protect-env-files
statement: Never edit or overwrite environment and key files — the agent reads config, humans manage secrets
tier: deterministic
mode: enforce
created: 2026-07-07
snooze_until: null
check:
  type: file_protect
  paths:
    - .env
    - .env.*
    - "*.pem"
    - "*.key"
    - id_rsa
    - id_ed25519
    - credentials.json
    - .npmrc
