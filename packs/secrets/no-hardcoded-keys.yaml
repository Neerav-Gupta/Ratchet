id: no-hardcoded-keys
statement: Never write API keys, tokens, or private keys into source files
tier: deterministic
mode: enforce
created: 2026-07-07
snooze_until: null
check:
  type: content
  pattern: (AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|xox[bap]-[0-9A-Za-z-]{10,}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----)
